<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE Login</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fdfbf6, #f2ede3);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: pageBlurIn 1s ease forwards;
        }

        @keyframes pageBlurIn {
            0% {
                filter: blur(15px);
                opacity: 0;
            }

            100% {
                filter: blur(0);
                opacity: 1;
            }
        }

        .auth-card {
            width: 480px;
            max-width: 100%;
            background: white;
            border-radius: 30px;
            padding: 60px 50px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.9s ease forwards;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 40px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 14px;
            border-radius: 14px;
            border: 1px solid #e5e5e5;
            background: #fafafa;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
            background: white;
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            font-size: 13px;
            color: #999;
            background: white;
            padding: 0 6px;
            transition: 0.3s;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -9px;
            font-size: 11px;
            color: #d4af37;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
        }

        .eye-icon:hover {
            color: #d4af37;
        }

        .forgot {
            text-align: right;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        .forgot a {
            text-decoration: none;
            color: #b9982e;
            transition: 0.3s;
        }

        .forgot a:hover {
            color: #d4af37;
        }

        /* Shimmer Button */
        .auth-btn {
            position: relative;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(120deg, #d4af37, #f1d37a, #d4af37);
            background-size: 200% 200%;
            font-weight: 500;
            cursor: pointer;
            transition: 0.4s;
        }

        .auth-btn:hover {
            animation: shimmer 1.5s infinite linear;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.35);
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        .social-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
            margin-top: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-color: #d4af37;
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }

        .signup-link a {
            text-decoration: none;
            color: #b9982e;
            font-weight: 500;
            margin-left: 6px;
            transition: 0.3s;
        }

        .signup-link a:hover {
            color: #d4af37;
        }

        @media(max-width:600px) {
            .auth-card {
                padding: 40px 25px;
                border-radius: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="logo">LUXE</div>

        <div class="input-group">
            <input type="email" required placeholder=" ">
            <label>Email</label>
        </div>

        <div class="input-group">
            <input type="password" id="loginPassword" required placeholder=" ">
            <label>Password</label>
            <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePassword('loginPassword', this)"></i>
        </div>

        <div class="forgot">
            <a href="./resetpassword.html">Forgot Password?</a>
        </div>

        <button class="auth-btn">Login</button>

        <button class="social-btn"><i class="fa-brands fa-google"></i> Login with Google</button>
        <button class="social-btn"><i class="fa-brands fa-apple"></i> Login with Apple</button>
        <button class="social-btn"><i class="fa-brands fa-instagram"></i> Login with Instagram</button>
        <button class="social-btn"><i class="fa-brands fa-x-twitter"></i> Login with X</button>

        <div class="signup-link">
            Don't have an account?
            <a href="./Signup.html">Sign Up</a>
        </div>

    </div>

    <script>
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }
    </script>

</body>

</html>
