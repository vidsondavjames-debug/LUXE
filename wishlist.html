<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f7f7f7;
            padding: 30px;
        }

        h1 {
            margin-bottom: 30px;
        }

        /* Layout */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* Wishlist Item */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 14px;
        }

        .details {
            flex: 1;
        }

        .price {
            color: #666;
            font-size: 14px;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-cart {
            background: black;
            color: white;
        }

        .add-cart:hover {
            opacity: 0.85;
        }

        .remove {
            background: #eee;
        }

        .remove:hover {
            background: #ddd;
        }

        /* Summary */
        .summary {
            background: white;
            border-radius: 20px;
            padding: 25px;
            height: fit-content;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .summary h2 {
            margin-bottom: 20px;
        }

        .summary div {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
        }

        /* Responsive */
        @media(max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <h1>Your Wishlist</h1>

    <div class="container">
        <div id="wishlist-items"></div>

        <div class="summary">
            <h2>Wishlist Summary</h2>
            <div>
                <span>Total Items</span>
                <span id="count">0</span>
            </div>
        </div>
    </div>

    <script src="./script.js">
    
    </script>

</body>

</html>
