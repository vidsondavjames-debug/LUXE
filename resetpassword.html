<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE Password Reset</title>
    <link rel="icon" type="image/x-icon" href="./assets/Password-Reset-favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Style Sheet Link -->
    <link rel="stylesheet" href="./style.css">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap CSS Link -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f5f0, #efe8dc);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <main>
        <div class="reset-card">
            <div class="logo">LUXE</div>
            <div class="subtitle">Secure multi-step password recovery</div>
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="step active" id="step1">
                <div class="toggle-method">
                    <button id="emailBtn" class="active" onclick="switchMethod('email')">Email</button>
                    <button id="phoneBtn" onclick="switchMethod('phone')">Phone</button>
                </div>
                <div class="input-group" id="emailField"><input type="email" placeholder=" "><label>Email
                        Address</label>
                </div>
                <div class="input-group" id="phoneField" style="display:none;"><input type="tel"
                        placeholder=" "><label>Phone Number</label></div>
                <button class="action-btn" onclick="nextStep(2)">Send Code</button>
            </div>

            <div class="step" id="step2">
                <div class="otp-container">
                    <input maxlength="1" oninput="moveNext(this)" onkeydown="handleBackspace(event,this)">
                    <input maxlength="1" oninput="moveNext(this)" onkeydown="handleBackspace(event,this)">
                    <input maxlength="1" oninput="moveNext(this)" onkeydown="handleBackspace(event,this)">
                    <input maxlength="1" oninput="moveNext(this)" onkeydown="handleBackspace(event,this)">
                    <input maxlength="1" oninput="moveNext(this)" onkeydown="handleBackspace(event,this)">
                    <input maxlength="1" oninput="moveNext(this)" onkeydown="handleBackspace(event,this)">
                </div>
                <button class="action-btn" onclick="nextStep(3)">Verify Code</button>
            </div>

            <div class="step" id="step3">
                <div class="input-group">
                    <input type="password" id="newPassword" placeholder=" ">
                    <label>New Password</label>
                    <i class="fa-solid fa-eye-slash" onclick="togglePassword('newPassword',this)"></i>
                </div>
                <div class="strength" id="strengthText"></div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmNewPassword" placeholder=" ">
                    <label>Confirm New Password</label>
                    <i class="fa-solid fa-eye-slash" onclick="togglePassword('confirmNewPassword',this)"></i>
                </div>
                <div class="match-msg" id="matchMessage"></div>
                <button class="action-btn" onclick="finishReset()">Reset Password</button>
            </div>

            <div class="success-screen" id="successScreen">
                <svg class="checkmark" viewBox="0 0 52 52">
                    <circle cx="26" cy="26" r="25" />
                    <path d="M14 27 l7 7 l16 -16" />
                </svg>
                <h3>Password Updated</h3>
                <p>You can now login with your new password.</p>
                <a href="login.html"><button class="action-btn">Login Now</button></a>
            </div>
        </div>
    </main>

    <script>
        let currentStep = 1;
        function switchMethod(method) {
            emailBtn.classList.remove('active'); phoneBtn.classList.remove('active');
            if (method === 'email') { emailField.style.display = 'block'; phoneField.style.display = 'none'; emailBtn.classList.add('active'); }
            else { emailField.style.display = 'none'; phoneField.style.display = 'block'; phoneBtn.classList.add('active'); }
        }
        function nextStep(step) { document.getElementById('step' + currentStep).classList.remove('active'); document.getElementById('step' + step).classList.add('active'); currentStep = step; progressBar.style.width = (step * 33) + '%'; }
        function moveNext(el) { if (el.value.length === 1 && el.nextElementSibling) { el.nextElementSibling.focus(); } }
        function handleBackspace(e, el) { if (e.key === 'Backspace' && el.value === '') { if (el.previousElementSibling) el.previousElementSibling.focus(); } }
        const passwordInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmNewPassword');
        passwordInput.addEventListener('input', checkStrength);
        confirmInput.addEventListener('input', checkMatch);
        function checkStrength() {
            let val = passwordInput.value; let score = 0;
            if (val.length >= 12) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[a-z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            let strength = ['Very Weak', 'Weak', 'Medium', 'Strong', 'Luxury', 'Elite'];
            strengthText.innerText = 'Password Strength: ' + strength[score];
            let percent = (score / 5) * 100;
            document.getElementById('strengthFill').style.width = percent + '%';
        }
        function checkMatch() {
            if (confirmInput.value === '') { matchMessage.innerText = ''; return; }
            if (confirmInput.value === passwordInput.value) { matchMessage.style.color = 'green'; matchMessage.innerText = 'Passwords match ✔'; }
            else { matchMessage.style.color = 'red'; matchMessage.innerText = 'Passwords do not match'; }
        }
        function finishReset() { if (passwordInput.value !== confirmInput.value) { alert('Passwords do not match'); return; } step3.style.display = 'none'; document.querySelector('.progress').style.display = 'none'; successScreen.style.display = 'block'; }
        function togglePassword(id, icon) { const input = document.getElementById(id); if (input.type === 'password') { input.type = 'text'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } else { input.type = 'password'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } }
    </script>
</body>

</html>
