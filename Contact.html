<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: black;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.85;
        }

        .info p {
            margin: 15px 0;
            color: #555;
        }

        /* MAP */
        .map {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
        }

        .map iframe {
            width: 100%;
            height: 200px;
            border: 0;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: black;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s ease;
            z-index: 9999;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* SUCCESS ANIMATION */
        .success {
            text-align: center;
            display: none;
        }

        .success.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .checkmark {
            font-size: 50px;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media(max-width:768px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Contact Us</h1>

        <div class="contact-wrapper">

            <div class="card">
                <h2>Send Message</h2>

                <div id="form-area">
                    <input type="text" placeholder="Your Name" id="name">
                    <input type="email" placeholder="Your Email" id="email">
                    <textarea placeholder="Your Message" id="message"></textarea>
                    <button onclick="sendMessage()">Send Message</button>
                </div>

                <div class="success" id="successBox">
                    <div class="checkmark">✔</div>
                    <h3>Message Sent!</h3>
                    <p>We’ll get back to you shortly.</p>
                </div>

            </div>

            <div class="card info">
                <h2>Get in Touch</h2>
                <p>📍 123 Luxury Street, New York</p>
                <p>📞 +1 234 567 890</p>
                <p>📧 support@luxurystore.com</p>

                <div class="map">
                    <iframe src="https://www.google.com/maps?q=New+York&output=embed"></iframe>
                </div>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        function sendMessage() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            if (!name || !email || !message) {
                showToast('Please fill all fields');
                return;
            }

            showToast('Sending message...');

            setTimeout(() => {
                document.getElementById('form-area').style.display = 'none';
                document.getElementById('successBox').classList.add('active');
            }, 800);
        }
    </script>

</body>

</html>
